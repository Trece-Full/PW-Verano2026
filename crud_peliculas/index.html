<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuevana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CRUD de Peliculas</h1>
    <form id="formulario" action="">
        <input id="id" type="hidden" placeholder="Id">
        <input id="titulo" type="text" placeholder="Titulo">
        <input  id="director" type="text" placeholder="Director">
        <input type="number" placeholder="Año" id="año">
        <button type="submit">Guardar</button>

    </form>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Titulo</th>
                <th>Direccion</th>
                <th>Año</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaPeliculas">

        </tbody>
    </table>

        <script src="script.js"></script>


</body>
</html>
